{% set image = resize_image(path=path, width=width, height=height, op=op) %}
{% set original_url = get_url(path=path) %}
<a href="{{ original_url }}" data-lightbox>
    <img
        src="{{ image.url }}"
        alt=""
        width="{{ image.width }}"
        height="{{ image.height }}"
        class="lightbox-img rounded-lg shadow-sm mx-auto block"
    />
</a>
