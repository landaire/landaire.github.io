{% extends "base.html" %}

{% block title %}#{{ term.name }} | {{ super() }}{% endblock %}

{% block main %}
<main>
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-1">
      Posts tagged #{{ term.name }}
    </h1>
    <a href="{{ get_url(path="@/_index.md") }}" class="text-sm text-accent-600 dark:text-accent-400 hover:underline">
      View all posts
    </a>
  </div>

  <ul class="space-y-1">
    {% for page in term.pages %}
    <li>
      <a href="{{ page.permalink }}" class="post-item flex items-baseline gap-4">
        <time datetime="{{ page.date | date(format='%+') }}" class="text-sm text-gray-400 dark:text-gray-500 tabular-nums shrink-0">
          {{ page.date | date(format=config.extra.date_format) }}
        </time>
        <span class="text-gray-800 dark:text-gray-200">{{ page.title }}</span>
      </a>
    </li>
    {% endfor %}
  </ul>
</main>
{% endblock %}
