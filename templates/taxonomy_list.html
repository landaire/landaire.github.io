{% extends "base.html" %}

{% block title %}Tags | {{ super() }}{% endblock %}

{% block main %}
<main>
  <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-6">Tags</h1>
  <div class="flex flex-wrap gap-2">
    {% for term in terms %}
    <a href="{{ term.permalink }}" class="tag-pill">
      #{{ term.name }} <span class="text-gray-400 dark:text-gray-500">({{ term.pages | length }})</span>
    </a>
    {% endfor %}
  </div>
</main>
{% endblock %}
